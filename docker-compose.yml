# ============================================================
# docker-compose.yml — entorno local del bot
# Modo por defecto: paper trading / backtests. NO live.
# ============================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scalping-bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./config:/app/config:ro
    environment:
      # Forzar el modo seguro por defecto
      TRADING_MODE: ${TRADING_MODE:-paper}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
      I_UNDERSTAND_THE_RISKS: ${I_UNDERSTAND_THE_RISKS:-false}
    restart: unless-stopped
    # No exponer puertos por defecto; añadir cuando exista API interna.

